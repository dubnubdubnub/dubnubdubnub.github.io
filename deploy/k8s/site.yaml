apiVersion: apps/v1
kind: Deployment
metadata:
  name: site
  namespace: tenant-isaac
  labels:
    app: site
spec:
  replicas: 1
  selector:
    matchLabels:
      app: site
  template:
    metadata:
      labels:
        app: site
    spec:
      containers:
        - name: nginx
          # Built and pushed by .github/workflows/docker-image.yml
          image: ghcr.io/dubnubdubnub/portfolio:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /index.html
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /index.html
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: site
  namespace: tenant-isaac
spec:
  selector:
    app: site
  ports:
    - port: 80
      targetPort: 80
