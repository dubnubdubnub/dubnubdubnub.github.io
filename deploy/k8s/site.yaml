apiVersion: apps/v1
kind: Deployment
metadata:
  name: site
  namespace: web
  labels:
    app: site
spec:
  replicas: 1
  selector:
    matchLabels:
      app: site
  template:
    metadata:
      labels:
        app: site
    spec:
      # Static site needs no Kubernetes API access — don't hand a compromised
      # nginx a token it could use to talk to the API server.
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          # Built and pushed by .github/workflows/docker-image.yml
          image: ghcr.io/dubnubdubnub/portfolio:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            # Stock nginx runs its master as root to bind :80 and drop to the
            # nginx user; keep only the caps that needs, drop everything else.
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "SETUID", "SETGID", "NET_BIND_SERVICE", "DAC_OVERRIDE"]
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /index.html
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /index.html
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: site
  namespace: web
spec:
  selector:
    app: site
  ports:
    - port: 80
      targetPort: 80
