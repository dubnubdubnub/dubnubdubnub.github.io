server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip text assets (the .hdr env maps are already binary — leave them be)
    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1024;

    # Vite emits content-hashed filenames under /assets — safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Large HDR environment maps — cache hard, they don't change without a rebuild.
    location ~* \.hdr$ {
        expires 30d;
        add_header Cache-Control "public";
        types { } default_type application/octet-stream;
    }

    # index.html must never be stale, or clients pin old asset hashes.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
